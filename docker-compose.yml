version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # ── Azure OpenAI ────────────────────────────────────────────────────────
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-10-21}
      - AZURE_EMBEDDING_DEPLOYMENT=${AZURE_EMBEDDING_DEPLOYMENT:-}
      # ── Azure AI Vision ─────────────────────────────────────────────────────
      - AZURE_VISION_ENDPOINT=${AZURE_VISION_ENDPOINT:-}
      - AZURE_VISION_KEY=${AZURE_VISION_KEY:-}
      # ── Azure AI Content Safety ─────────────────────────────────────────────
      - AZURE_CONTENT_SAFETY_ENDPOINT=${AZURE_CONTENT_SAFETY_ENDPOINT:-}
      - AZURE_CONTENT_SAFETY_KEY=${AZURE_CONTENT_SAFETY_KEY:-}
      # ── Azure AI Search ─────────────────────────────────────────────────────
      - AZURE_SEARCH_ENDPOINT=${AZURE_SEARCH_ENDPOINT:-}
      - AZURE_SEARCH_KEY=${AZURE_SEARCH_KEY:-}
      - AZURE_SEARCH_INDEX=${AZURE_SEARCH_INDEX:-auragraph-chunks}
      # ── Azure Cosmos DB ─────────────────────────────────────────────────────
      - COSMOS_DB_URL=${COSMOS_DB_URL:-}
      - COSMOS_DB_KEY=${COSMOS_DB_KEY:-}
      - COSMOS_DB_DATABASE=${COSMOS_DB_DATABASE:-auragraph}
      - COSMOS_DB_CONTAINER=${COSMOS_DB_CONTAINER:-mastery}
      # ── Groq (LLM fallback) ─────────────────────────────────────────────────
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      # ── App config ──────────────────────────────────────────────────────────
      - CORS_ORIGINS=${FRONTEND_URL:-http://localhost:3000},http://localhost:5173
      - DEMO_ENABLED=${DEMO_ENABLED:-false}
      - TOKEN_PEPPER=${TOKEN_PEPPER:-change-this-in-production}
      - MAX_TOTAL_UPLOAD_MB=${MAX_TOTAL_UPLOAD_MB:-500}
      - LLM_HOURLY_LIMIT=${LLM_HOURLY_LIMIT:-40}
      - LLM_DAILY_LIMIT=${LLM_DAILY_LIMIT:-200}
      - LLM_CONCURRENCY=${LLM_CONCURRENCY:-3}
    volumes:
      - backend_data:/app/knowledge_store
      - backend_data:/app/vector_index
      - backend_data:/app/slide_images
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  backend_data:
